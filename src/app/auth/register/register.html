
<form action="" (ngSubmit)="register()">
    <div class="container">
        <h1>Register</h1>
        <p>Please fill in this form to create an account.</p>
        <hr>
    
        <label for="Role"><b>Role</b></label>
        <select [(ngModel)]="formData.Role" name="role" required>
            <option value="" disabled selected>Select Role</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>


        <label for="Username"><b>Username</b></label>
        <input type="text" [(ngModel)]="formData.username" placeholder="Enter Username" name="Username" required >
    
        <label for="psw"><b>Password</b></label>
        <input type="password" [(ngModel)]="formData.password" placeholder="Enter Password" name="psw" required>

        <button type="submit">Register </button>
    
    </div>
    
    
</form>

<p>Already have an account? </p>
<a routerLink="/login">Login here</a>
